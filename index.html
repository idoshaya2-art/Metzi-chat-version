<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מציאה · METZI — דמו מסך מלא למשקיעים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&family=Play:wght@400;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --forest:#1B4332; --forest-mid:#2F6B4F; --forest-deep:#0E2D20; --forest-ink:#06150F;
    --sage:#A3B89B; --sage-light:#C9D8C5; --ivory:#F4F0E3; --ivory-card:#FBF8EF;
    --gold:#C9A35C; --amber:#E0A93F; --line:#E5DEC9;
    --hebrew:'Assistant','Segoe UI',Arial,sans-serif;
    --display:'Play','Assistant',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:var(--hebrew);
    background:radial-gradient(1100px 760px at 72% -8%, #17452f 0%, #0a241a 52%, #050f0b 100%);
    color:var(--ivory);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;user-select:none;cursor:pointer;
  }
  body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(90px);opacity:.16;pointer-events:none}
  body::before{width:420px;height:420px;background:var(--sage);top:-140px;inset-inline-start:-120px}
  body::after{width:380px;height:380px;background:var(--gold);bottom:-180px;inset-inline-end:-110px;opacity:.08}

  .stage{display:flex;flex-direction:column;align-items:center;gap:14px;padding:16px;max-height:100vh}

  /* ───── brand header ───── */
  .brand{text-align:center;line-height:1.1}
  .wordmark{font-family:var(--display);font-weight:700;font-size:30px;letter-spacing:.04em;color:var(--ivory)}
  .wordmark .spark{color:var(--gold);font-size:20px;vertical-align:6px;margin-inline-end:6px}
  .brand-sub{font-size:12.5px;color:var(--sage);font-weight:600;letter-spacing:.12em;margin-top:4px}
  .brand-sub .livedot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#E25C4A;margin-inline-end:6px;animation:pulse 1.6s infinite}

  /* ───── phone mockup ───── */
  .phone{
    position:relative;height:min(80vh,820px);aspect-ratio:9/19.2;
    background:linear-gradient(160deg,#23262a,#0b0d0f 60%);
    border-radius:54px;padding:11px;
    box-shadow:0 36px 80px rgba(0,0,0,.6), 0 0 0 1.5px rgba(255,255,255,.07) inset, 0 0 70px rgba(163,184,155,.10);
  }
  .phone::before,.phone::after{content:'';position:absolute;background:#2c3034;border-radius:3px}
  .phone::before{width:3px;height:84px;inset-inline-start:-3px;top:170px}
  .phone::after{width:3px;height:54px;inset-inline-end:-3px;top:150px}
  .screen{
    position:relative;height:100%;width:100%;border-radius:44px;overflow:hidden;
    background:var(--ivory);display:flex;flex-direction:column;
  }
  .island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:108px;height:28px;border-radius:18px;background:#000;z-index:30}
  .statusbar{display:flex;justify-content:space-between;align-items:center;padding:13px 26px 4px;font-weight:700;font-size:13.5px;color:var(--forest-ink)}
  .sb-icons{display:flex;gap:5px;align-items:center}
  .sb-icons svg{display:block}

  .appbar{
    display:flex;align-items:center;gap:10px;padding:9px 14px 10px;
    background:linear-gradient(135deg,var(--forest) 0%,var(--forest-deep) 100%);color:var(--ivory);
    box-shadow:0 2px 10px rgba(6,21,15,.18);z-index:5;
  }
  .avatar{width:38px;height:38px;border-radius:50%;background:radial-gradient(circle at 30% 25%,var(--sage-light),var(--sage) 70%);display:grid;place-items:center;font-size:19px;box-shadow:0 0 0 2px rgba(242,237,220,.35)}
  .appbar-txt{line-height:1.15}
  .appname{font-weight:800;font-size:16px}
  .appname .en{font-family:var(--display);font-weight:700;font-size:11px;color:var(--sage-light);letter-spacing:.14em;margin-inline-start:4px}
  .appstatus{font-size:11.5px;color:var(--sage-light);font-weight:600}
  .appstatus i{display:inline-block;width:7px;height:7px;border-radius:50%;background:#7FD89B;margin-inline-end:4px;animation:pulse 2s infinite}
  .menu{margin-inline-start:auto;font-size:20px;color:var(--sage-light);font-weight:700;padding:0 4px}

  /* ───── chat ───── */
  .chat{flex:1;overflow-y:auto;padding:12px 11px 12px;scrollbar-width:none;
    background:
      radial-gradient(rgba(27,67,50,.045) 1px, transparent 1.5px) 0 0/22px 22px,
      var(--ivory);}
  .chat::-webkit-scrollbar{display:none}
  .daychip{width:fit-content;margin:2px auto 10px;background:rgba(27,67,50,.08);color:#56685B;font-size:11px;font-weight:700;padding:4px 12px;border-radius:999px;letter-spacing:.04em}
  .starthint{margin-top:160px;text-align:center;color:#9AA796;font-weight:600;font-size:14px;line-height:1.8;animation:fadein 1s}
  .starthint .s{color:var(--gold);font-size:22px;display:block;margin-bottom:4px}

  .msg{max-width:84%;padding:10px 13px;border-radius:18px;margin:5px 0;font-size:15px;line-height:1.5;
    width:fit-content;animation:pop .32s cubic-bezier(.2,.9,.3,1.2);box-shadow:0 1px 4px rgba(6,21,15,.07);position:relative}
  .msg.bot{background:#fff;border:1px solid var(--line);color:#1d2a21;margin-inline-end:auto;border-start-start-radius:6px}
  .msg.me{background:linear-gradient(135deg,var(--forest-mid),var(--forest));color:#F2EDDC;margin-inline-start:auto;border-start-end-radius:6px}
  .msg .w{opacity:.14;transition:opacity .16s}
  .msg .w.on{opacity:1}

  .typing{display:flex;gap:5px;align-items:center;padding:14px 16px}
  .typing span{width:7px;height:7px;border-radius:50%;background:#A9B5A6;animation:blink 1.1s infinite}
  .typing span:nth-child(2){animation-delay:.18s}
  .typing span:nth-child(3){animation-delay:.36s}

  /* voice bubble */
  .msg.voice{min-width:64%}
  .vrow{display:flex;align-items:center;gap:9px}
  .vplay{width:30px;height:30px;border-radius:50%;background:rgba(242,237,220,.2);display:grid;place-items:center;font-size:11px;flex:none}
  .vwave{display:flex;align-items:center;gap:2.5px;height:22px;flex:1}
  .vwave i{width:3px;border-radius:2px;background:rgba(242,237,220,.85);animation:eq 1s ease-in-out infinite alternate}
  .vtime{font-size:11.5px;opacity:.8;font-weight:600}
  .vtxt{margin-top:8px;padding-top:8px;border-top:1px solid rgba(242,237,220,.25);font-size:15px}
  .vlabel{display:block;font-size:10px;letter-spacing:.08em;color:rgba(242,237,220,.65);font-weight:700;margin-bottom:2px}
  .vattach{margin-top:8px;background:rgba(242,237,220,.16);border:1px dashed rgba(242,237,220,.4);border-radius:11px;padding:6px 9px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:8px}
  .athumb{width:42px;height:28px;object-fit:contain;background:#F2EDDC;border-radius:6px;padding:2px;flex:none}

  /* card messages */
  .msg.cardmsg{max-width:94%;width:94%;padding:0;background:transparent;border:none;box-shadow:none}

  /* ── 360° scanner ── */
  .scancard{background:linear-gradient(180deg,#103425,#0A2418);border:1px solid rgba(163,184,155,.3);border-radius:18px;padding:10px 10px 9px;box-shadow:0 8px 26px rgba(6,21,15,.25)}
  .scanhead{display:flex;align-items:center;gap:8px;color:var(--sage-light);font-size:12.5px;font-weight:700;padding:1px 4px 7px}
  .rec{width:8px;height:8px;border-radius:50%;background:#E25C4A;animation:pulse 1.1s infinite;flex:none}
  .deg{margin-inline-start:auto;font-family:var(--display);font-weight:700;font-size:16px;color:var(--ivory);min-width:62px;text-align:left;direction:ltr}
  .scanstage{text-align:center;color:var(--sage);font-size:12.5px;font-weight:600;padding-top:7px;min-height:18px}
  .scanstage.flip{animation:stageflip .45s}
  .complete .rec{background:#7FD89B;animation:none}

  .scanwrap{position:relative;aspect-ratio:340/250;border-radius:12px;overflow:hidden;background:rgba(6,21,15,.4)}
  .scanwrap > svg{position:absolute;inset:0;width:100%;height:100%}
  .turntable{fill:rgba(163,184,155,.07);stroke:rgba(163,184,155,.4);stroke-dasharray:5 6;stroke-width:1}
  .sofa-photo{position:absolute;left:50%;bottom:17.5%;width:76%;transform:translateX(-50%);z-index:2;
    filter:drop-shadow(0 12px 14px rgba(0,0,0,.5));transition:opacity .65s,filter .65s,transform .65s}
  .scanning .sofa-photo{filter:drop-shadow(0 0 12px rgba(201,216,197,.4)) drop-shadow(0 12px 14px rgba(0,0,0,.5))}
  .thinking .sofa-photo{opacity:.07;filter:blur(4px);transform:translateX(-50%) scale(.96)}

  .aiwrap{position:absolute;inset:0;z-index:3;opacity:0;transition:opacity .8s;pointer-events:none;overflow:hidden}
  .thinking .aiwrap{opacity:1}
  .aiwrap .aiimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    animation:kenburns 9s ease-in-out infinite alternate, aiglow 3s ease-in-out infinite}
  .aiwrap .pdot{position:absolute;bottom:-10px;border-radius:50%;background:#7FE0A0;box-shadow:0 0 9px #58c08a;opacity:0;animation:floatup linear infinite}

  /* נקודות גרדיאנט — גרסה כהה למסך החשיבה */
  .gradient-dots-think{
    position:absolute; inset:0; z-index:0; overflow:hidden;
    --gd-bg:#06160F;      /* רקע כהה שמסתיר את הנקודות ומשאיר רק הילות */
    --gd-dot:9px;
    --gd-space:11px;
    background-color:var(--gd-bg);
    background-image:
      radial-gradient(circle at 50% 50%, transparent 1.7px, var(--gd-bg) 0 var(--gd-dot), transparent var(--gd-dot)),
      radial-gradient(circle at 50% 50%, transparent 1.7px, var(--gd-bg) 0 var(--gd-dot), transparent var(--gd-dot)),
      radial-gradient(circle at 50% 50%, #13C56E, transparent 60%),
      radial-gradient(circle at 50% 50%, #0C6E40, transparent 55%),
      radial-gradient(circle at 50% 50%, #2E7BFF, transparent 60%),
      radial-gradient(ellipse at 50% 50%, #1746D6, transparent 60%);
    background-size:
      var(--gd-space) calc(var(--gd-space)*1.732),
      var(--gd-space) calc(var(--gd-space)*1.732),
      200% 200%, 200% 200%, 200% 200%, 200% calc(var(--gd-space)*1.732);
    background-position:
      0 0, calc(var(--gd-space)/2) calc(var(--gd-space)*0.866),
      0% 0%, 0% 0%, 0% 0%, 0% 0;
    animation: gddriftThink 26s linear infinite;
  }
  @keyframes gddriftThink{
    0%{background-position:
      0 0, calc(var(--gd-space)/2) calc(var(--gd-space)*0.866),
      800% 400%, -600% 500%, 1000% -400%, 400% calc(var(--gd-space)*1.732);}
    100%{background-position:
      0 0, calc(var(--gd-space)/2) calc(var(--gd-space)*0.866),
      0% 0%, 0% 0%, 0% 0%, 0% 0%;}
  }

  .overlay{z-index:4;pointer-events:none}
  #orbit{fill:none;stroke:rgba(201,216,197,.4);stroke-dasharray:3 8;stroke-width:1.2}
  .camglow{fill:rgba(242,237,220,.28)}
  .cambody{fill:#F2EDDC}
  .camlens{fill:#143726}
  #beam{opacity:0}
  .scanning #beam{opacity:1;animation:sweep 2.4s ease-in-out infinite alternate}
  .thinking #cam,.complete #cam{opacity:0 !important}
  #meas line{stroke:#EFE7CF;stroke-width:2;stroke-linecap:round;stroke-dasharray:320;stroke-dashoffset:320}
  .complete #meas line{animation:drawline .8s ease forwards}
  #meas .lbl{opacity:0}
  .complete #meas .lbl{animation:fadein .5s .55s both}
  #meas .pill{fill:#F2EDDC}
  #meas text{fill:#143726;font:700 13px var(--hebrew);text-anchor:middle}
  #flaw{opacity:0}
  .complete #flaw{animation:fadein .55s 1.05s both}
  #flaw .fpill{fill:#F6E3BC}
  #flaw text{fill:#6E4F14;font:700 12.5px var(--hebrew);text-anchor:middle}
  #flaw .fdot{fill:var(--amber)}
  #flaw .fring{fill:none;stroke:var(--amber);stroke-width:2;animation:flawring 1.5s ease-out infinite}
  #flaw .fline{stroke:var(--amber);stroke-width:1.5;stroke-dasharray:3 3}

  /* ── analysis data card ── */
  .datacard{background:var(--ivory-card);border:1px solid var(--line);border-radius:16px;padding:13px 15px 14px;box-shadow:0 6px 20px rgba(6,21,15,.1)}
  .dchead{font-size:11.5px;font-weight:800;letter-spacing:.1em;color:var(--forest-mid);padding-bottom:8px;margin-bottom:6px;border-bottom:1px solid var(--line)}
  .dcrow{display:flex;align-items:baseline;gap:8px;padding:4.5px 0;animation:fadeup .4s both}
  .dcrow:nth-child(2){animation-delay:.06s}.dcrow:nth-child(3){animation-delay:.14s}
  .dcrow:nth-child(4){animation-delay:.22s}.dcrow:nth-child(5){animation-delay:.3s}
  .dcrow .k{font-size:13.5px;color:#5D6F60;font-weight:600;flex:none}
  .dcrow .dots{flex:1;border-bottom:1.5px dotted #C9CDB9;transform:translateY(-4px)}
  .dcrow .v{font-size:14.5px;font-weight:800;color:var(--forest-ink)}
  .dcgauge{display:flex;align-items:center;gap:13px;padding:8px 0 3px;margin-top:2px;border-top:1.5px dashed var(--line);animation:fadeup .45s .4s both}
  .dcgauge svg{flex:none}
  .gtrack{fill:none;stroke:#E2DECB;stroke-width:8;stroke-linecap:round}
  .gfill{fill:none;stroke:url(#ggrad);stroke-width:8;stroke-linecap:round}
  .gnum{font-family:var(--display);font-weight:700;font-size:17px;fill:var(--forest);text-anchor:middle}
  .gtxt b{display:block;font-size:13.5px;color:#3C4F41;font-weight:800}
  .gnote{display:block;font-size:12px;font-weight:700;color:#8F6A2A;margin-top:3px;line-height:1.35}
  .dcprice{margin-top:9px;padding-top:9px;border-top:1.5px dashed var(--line);animation:fadeup .45s .62s both}
  .pl{display:flex;justify-content:space-between;align-items:center;padding:4px 2px}
  .pl.main b{font-family:var(--display);font-size:24px;color:var(--forest)}
  .pl.main span,.pl.fee span:first-child{font-size:13.5px;color:#5D6F60;font-weight:600}
  .pl.fee span:last-child{font-size:14px;font-weight:700;color:#A65B4B;direction:ltr}
  .pl.net{background:#E6EFDD;border-radius:12px;padding:9px 12px;margin-top:6px;animation:netpop .5s .95s both}
  .pl.net span{font-size:14px;font-weight:800;color:#27513B}
  .pl.net b{font-family:var(--display);font-size:22px;color:#1F5A3D}

  /* chips */
  .chips{display:flex;gap:8px;margin:5px 0 8px;margin-inline-end:auto;animation:pop .35s}
  .chip{font-family:var(--hebrew);font-size:14px;font-weight:700;padding:8px 16px;border-radius:999px;border:1.5px solid var(--forest-mid);background:#fff;color:var(--forest);cursor:pointer;transition:.25s}
  .chip.yes{box-shadow:0 2px 8px rgba(27,67,50,.15)}
  .chip.picked{background:var(--forest);color:#F2EDDC;transform:scale(1.05)}
  .chip.dim{opacity:.32}

  /* listing card */
  .listcard{display:flex;gap:11px;align-items:center;background:var(--ivory-card);border:1px solid var(--line);border-radius:16px;padding:11px 13px;box-shadow:0 6px 20px rgba(6,21,15,.1)}
  .thumb{width:82px;height:56px;flex:none;background:linear-gradient(180deg,#EDEAD9,#E2DECB);border-radius:11px;display:grid;place-items:center;overflow:hidden}
  .thumb img{width:90%;height:90%;object-fit:contain}
  .li-title{font-size:14.5px;font-weight:800;color:var(--forest-ink)}
  .li-price{font-family:var(--display);font-size:19px;font-weight:700;color:var(--forest);margin:1px 0 3px}
  .li-meta{display:flex;gap:10px;align-items:center;font-size:11px;font-weight:700}
  .li-meta .live{color:#2C7A4B}
  .li-meta .live i{display:inline-block;width:6px;height:6px;border-radius:50%;background:#2C7A4B;margin-inline-end:4px;animation:pulse 1.4s infinite}
  .li-meta .views{color:#7A8779}

  /* listening pill */
  .listen{position:absolute;inset-inline:14px;bottom:88px;background:rgba(14,45,32,.95);backdrop-filter:blur(6px);color:var(--ivory);
    border:1px solid rgba(163,184,155,.35);border-radius:17px;padding:11px 15px;display:flex;align-items:center;gap:13px;z-index:25;
    opacity:0;transform:translateY(16px);pointer-events:none;transition:.3s}
  .listen.on{opacity:1;transform:translateY(0)}
  .micwrap{position:relative;width:34px;height:34px;border-radius:50%;background:var(--forest-mid);display:grid;place-items:center;flex:none}
  .micwrap::before{content:'';position:absolute;inset:-5px;border-radius:50%;border:2px solid rgba(163,184,155,.6);animation:ring 1.4s infinite}
  .lbars{display:flex;align-items:center;gap:3.5px;height:22px}
  .lbars i{width:4px;border-radius:2px;background:var(--sage-light);animation:eq .7s ease-in-out infinite alternate}
  .lbars i:nth-child(1){height:8px;animation-delay:0s}.lbars i:nth-child(2){height:16px;animation-delay:.12s}
  .lbars i:nth-child(3){height:21px;animation-delay:.22s}.lbars i:nth-child(4){height:13px;animation-delay:.05s}
  .lbars i:nth-child(5){height:18px;animation-delay:.3s}
  .listen b{font-size:14px;font-weight:700}
  .listen small{display:block;font-size:11px;color:var(--sage);font-weight:600}

  /* input bar */
  .inputbar{display:flex;gap:8px;align-items:center;padding:8px 12px 5px;background:var(--ivory);border-top:1px solid var(--line)}
  .field{flex:1;background:#fff;border:1px solid var(--line);border-radius:999px;padding:10px 16px;color:#9AA093;font-size:13.5px;font-weight:600}
  .field.typing{color:#15291D;font-weight:700}
  .micbtn{position:relative;width:44px;height:44px;border-radius:50%;border:none;background:var(--forest);color:var(--ivory);display:grid;place-items:center;cursor:pointer;flex:none}
  .micbtn.hot::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:2.5px solid rgba(226,92,74,.8);animation:ring 1.2s infinite}
  .homebar{width:118px;height:5px;border-radius:3px;background:rgba(27,67,50,.45);margin:5px auto 8px}

  /* notification */
  .notif{position:absolute;top:52px;inset-inline:10px;z-index:40;display:flex;gap:10px;align-items:flex-start;
    background:rgba(252,250,243,.94);backdrop-filter:blur(10px);border-radius:18px;padding:10px 12px;
    box-shadow:0 14px 34px rgba(6,21,15,.3);transform:translateY(-140px);transition:transform .5s cubic-bezier(.2,.9,.3,1.1)}
  .notif.show{transform:translateY(0)}
  .n-icon{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--forest-mid),var(--forest));color:var(--ivory);font-family:var(--display);font-weight:700;font-size:19px;display:grid;place-items:center;flex:none}
  .n-body{flex:1;line-height:1.35}
  .n-top{display:flex;justify-content:space-between;font-size:11.5px}
  .n-top b{color:var(--forest);font-weight:800}
  .n-top span{color:#9aa093;font-weight:600}
  .n-text{font-size:13px;font-weight:700;color:#23362A;margin-top:1px}

  /* confetti */
  .cf{position:absolute;top:-14px;width:8px;height:13px;border-radius:2px;z-index:35;animation:fall 2.6s ease-in forwards;pointer-events:none}

  /* ───── controls footer ───── */
  .controls{display:flex;align-items:center;gap:11px;color:rgba(242,237,220,.78);font-size:12.5px;font-weight:600;cursor:default;flex-wrap:wrap;justify-content:center}
  .controls button{font-family:var(--hebrew);font-size:12.5px;font-weight:700;color:var(--ivory);background:rgba(242,237,220,.08);
    border:1px solid rgba(242,237,220,.25);border-radius:999px;padding:6px 14px;cursor:pointer;transition:.2s}
  .controls button:hover{background:rgba(242,237,220,.18)}
  .controls select{font-family:var(--hebrew);font-size:12.5px;font-weight:700;color:var(--ivory);background:rgba(6,21,15,.55);
    border:1px solid rgba(242,237,220,.25);border-radius:999px;padding:6px 12px;cursor:pointer;max-width:215px}
  .controls select option{color:#1d2a21;background:#F4F0E3}
  .stepper{font-family:var(--display);font-size:14px;letter-spacing:.06em;background:rgba(6,21,15,.4);border-radius:999px;padding:5px 13px;direction:ltr}
  .hint{color:rgba(163,184,155,.85)}

  .toast{position:fixed;bottom:18px;left:50%;transform:translate(-50%,60px);background:#0E2D20;color:var(--ivory);font-size:13px;font-weight:600;
    padding:9px 16px;border-radius:999px;border:1px solid rgba(163,184,155,.4);opacity:0;transition:.4s;z-index:99;pointer-events:none}
  .toast.show{opacity:1;transform:translate(-50%,0)}

  /* ───── animations ───── */
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  @keyframes blink{0%,80%,100%{opacity:.25;transform:translateY(0)}40%{opacity:1;transform:translateY(-3px)}}
  @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.96)}to{opacity:1;transform:none}}

  /* ── רקע נקודות גרדיאנט (פורט CSS מהקומפוננטה) — ירוק כהה + כחול בולט ── */
  .gradient-dots{position:absolute;inset:0;z-index:0;border-radius:46px;overflow:hidden;
    --gd-bg:#FBF8EF;          /* צבע הרקע/הנקודות שמסתיר את ההילות */
    --gd-dot:8px;             /* גודל נקודה */
    --gd-space:11px;          /* מרווח */
    background-color:var(--gd-bg);
    background-image:
      radial-gradient(circle at 50% 50%, transparent 1.6px, var(--gd-bg) 0 var(--gd-dot), transparent var(--gd-dot)),
      radial-gradient(circle at 50% 50%, transparent 1.6px, var(--gd-bg) 0 var(--gd-dot), transparent var(--gd-dot)),

      var(--gd-space) calc(var(--gd-space) * 1.732),
      180% 180%, 165% 165%, 155% 155%, 170% calc(var(--gd-space) * 1.732);
    background-position:
      0 0, calc(var(--gd-space) / 2) calc(var(--gd-space) * 0.866),
      0% 0%, 100% 0%, 0% 100%, 100% 100%;
    animation:gddrift 24s ease-in-out infinite alternate;
    -webkit-mask-image:radial-gradient(130% 95% at 50% 38%, #000 50%, transparent 100%);
    mask-image:radial-gradient(130% 95% at 50% 38%, #000 50%, transparent 100%);}
  @keyframes gddrift{
    from{background-position:
      0 0, calc(var(--gd-space) / 2) calc(var(--gd-space) * 0.866),
      10% 15%, 90% 8%, 8% 88%, 92% 95%;}
    to{background-position:
      0 0, calc(var(--gd-space) / 2) calc(var(--gd-space) * 0.866),
      30% 5%, 70% 28%, 25% 70%, 75% 80%;}}

  @media (prefers-reduced-motion:reduce){
    #v5 *{animation:none!important}
  }
</style>

<style id="v6">
  /* ═══════════ V6 · 21st.dev-grade platform polish (web view) ═══════════ */

  /* פונט גאומטרי פרימיום ל-Latin/מספרים (עברית נשארת Assistant) */
  :root{ --display:'Space Grotesk','Assistant',sans-serif }
  /* ── גלילה פנימית חלקה בתוך מסך הטלפון (הצ'אט הוא הגולל, נשאר במסגרת) ── */
  .chat{scroll-behavior:smooth}

  /* ═══ מסגרת iPhone דור-אחרון (טיטניום שחור) + פרופורציה מעט חסונה יותר ═══ */
  .phone{
    aspect-ratio:9 / 18.5!important;          /* מעט רחב/חסון יותר, נשמר מראה טלפון */
    padding:13px!important;border-radius:62px!important;

      0 52px 110px rgba(0,0,0,.6),
      0 14px 32px rgba(0,0,0,.4),
      0 0 0 1px rgba(255,255,255,.16) inset,

      0 -3px 6px rgba(0,0,0,.5) inset,
      0 0 0 2px rgba(7,8,9,.92),
      0 0 120px rgba(127,190,142,.13)!important;
  }
  .screen{border-radius:49px!important;box-shadow:0 0 0 2.5px #0a0b0d!important}

  /* כפתורי טיטניום: Action · Volume · Power · Camera Control */
  .phone::before,.phone::after{display:none!important}

  /* Dynamic Island + עדשת מצלמה קדמית — בגודל שלא מסתיר את סמלי הסטטוס */

    box-shadow:0 1px 3px rgba(0,0,0,.5)}
  .island::after{content:'';position:absolute;right:10px;top:50%;transform:translateY(-50%);
    width:7.5px;height:7.5px;border-radius:50%;
    background:radial-gradient(circle at 38% 32%,#21323d,#05080a 68%);
    box-shadow:0 0 0 1px rgba(60,85,100,.5), 0 0 4px rgba(40,90,120,.4)}
  /* דוחפים את השעה והסמלים לקצוות כדי שיתפנה מקום ל-Island במרכז */
  .statusbar{padding-top:14px!important;padding-inline:11px!important}

  /* ── מספרים: tabular + tracking מהודק לתחושה פיננסית ── */
  .pl.main b,.pl.net b,.li-price,.deg,.gnum,.dcrow .v,.vtime,.sb-time{font-feature-settings:'tnum' 1,'lnum' 1}
  .pl.main b{letter-spacing:-.02em}
  .pl.net b{letter-spacing:-.015em}

  /* ── כרטיסים: ציפוי זהב פנימי + ריחוף עמוק יותר ── */

  /* ── border-beam מונפש (חתימת 21st.dev) על כרטיס התמחור ── */

  .datacard::after{
    content:'';position:absolute;inset:0;border-radius:inherit;padding:1.3px;pointer-events:none;z-index:1;
    background:conic-gradient(from var(--ang), transparent 0 58%, rgba(201,163,92,.95) 70%, rgba(127,224,160,.95) 80%, transparent 90% 100%);
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
    animation:spinAng 6.5s linear infinite;opacity:.85
  }

  /* ── שורת קלט: מוגבהת, עם טבעת חיה עדינה ── */
  .inputbar{box-shadow:0 -10px 30px rgba(6,21,15,.05)!important;border-top:1px solid rgba(27,67,50,.08)!important}
  .field{position:relative;box-shadow:0 2px 10px rgba(6,21,15,.06), 0 0 0 1px rgba(27,67,50,.05)!important}
  .field::after{
    content:'';position:absolute;inset:0;border-radius:inherit;padding:1.4px;pointer-events:none;
    background:conic-gradient(from var(--ang), transparent 0 64%, rgba(47,107,79,.55) 74%, rgba(201,163,92,.6) 84%, transparent 92% 100%);
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
    animation:spinAng 7.5s linear infinite;opacity:.65
  }
  .micbtn{box-shadow:0 8px 20px rgba(27,67,50,.38), 0 0 0 4px rgba(47,107,79,.10), 0 1px 0 rgba(255,255,255,.16) inset!important}

  /* ── הסתרת צ'יפים מומלצים במסך הבית (לפי בקשה) ── */
  .home-suggest{display:none!important}

  /* ── קונפטי בתוך מסך הטלפון (z מעל הצ'אט, מתחת להתראה/ספלאש) ── */
  .cf{z-index:36!important}

  /* ── אפקט לחיצה על צ'יפ "כן, פרסמי!" (נלחץ ואז קופץ לבחירה) ── */
  .chip{transition:transform .16s cubic-bezier(.2,.9,.3,1.25), background .25s, color .25s, box-shadow .25s}
  .chip:active{transform:scale(.94)}
  .chip.press{transform:scale(.9)!important}
  /* הווי מופיע רק כשנבחר (בלחיצה על "כן, פרסמי") — נכנס עם פופ קטן */
  .chip.yes::before{content:'✓';display:inline-block;max-width:0;opacity:0;transform:scale(.4);

/* ───────── DOM helpers ───────── */
const $id = id => document.getElementById(id);
const chat = $id('chat');
const CHAT_INIT  = '<div class="daychip">היום · אלן מוכרת רהיט</div>';
const BUYER_INIT = '<div class="daychip newchat">— שיחה חדשה · אורלי מחפשת ספה 🛋️ —</div>';
chat.innerHTML = CHAT_INIT;

function el(tag, cls){ const d = document.createElement(tag); if (cls) d.className = cls; return d; }
function scrollBottom(){ requestAnimationFrame(() => chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' })); }
let toastTimer = null;
function showToast(msg, ms){
  const t = $id('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), ms || 3600);
}

/* ───────── TTS — קול נשי בעברית ───────── */
let voice = null, voiceLocked = false, muted = true, pendingWords = null, revealTimer = null, warned = false, warnedMale = false;

const FEMALE_RE = /aria|jenny|zira|samantha|susan|libby|sonia|michelle|ava|allison|emma|amy|joanna|salli|kendra|kimberly|olivia|natasha|clara|google us english|female|woman/;
const MALE_RE = /david|mark|\bguy\b|ryan|christopher|eric|steffan|andrew|brian|justin|matthew|thomas|\bmale\b/;

function voiceScore(v){
  const n = v.name.toLowerCase();
  let s = 0;
  if (FEMALE_RE.test(n)) s += 50;                       // קולות נשיים מוכרים
  if (MALE_RE.test(n)) s -= 60;                         // הימנעות מקולות גבריים
  if (/natural|neural|online/.test(n)) s += 14;         // קולות טבעיים
  if (/google us english/.test(n)) s += 30;             // הקול הנשי האיכותי ב-Chrome
  if (/aria|jenny|samantha/.test(n)) s += 8;
  if (/^en[-_]?us/i.test(v.lang)) s += 6;
  return s;
}
function englishVoices(){
  if (!('speechSynthesis' in window)) return [];
  return speechSynthesis.getVoices()
    .filter(v => /^en/i.test(v.lang))
    .sort((a, b) => voiceScore(b) - voiceScore(a));
}
function fillVoiceSelect(list){
  const sel = $id('voiceSel');
  if (!sel) return;
  if (!list.length){
    sel.innerHTML = '<option>אין קול הקראה בדפדפן זה</option>';
    return;
  }
  sel.innerHTML = list.slice(0, 8).map(v => {
    const n = v.name.toLowerCase();
    const tag = MALE_RE.test(n) ? '👨 ' : (FEMALE_RE.test(n) ? '👩 ' : '🎙 ');
    const short = (v.name
      .replace(/Microsoft\s|Google\s|Online\s|\(Natural\)|Natural|English|United States|\(|\)|-/gi, ' ')
      .replace(/\s+/g, ' ').trim()) || v.name;
    return '<option value="' + v.voiceURI + '">' + tag + short + '</option>';
  }).join('');
  if (voice) sel.value = voice.voiceURI;
}
function pickVoice(){
  if (!('speechSynthesis' in window)) return;
  const list = englishVoices();
  fillVoiceSelect(list);
  if (!list.length){ voice = null; return; }
  if (voiceLocked && voice && list.some(v => v.voiceURI === voice.voiceURI)) return;
  voice = list[0];
  const sel = $id('voiceSel');
  if (sel) sel.value = voice.voiceURI;
  if (!warnedMale && MALE_RE.test(voice.name.toLowerCase())){
    warnedMale = true;
    showToast('⚠ לא זוהה קול נשי — אפשר לבחור קול אחר בבורר למטה', 6000);
  }
}
if ('speechSynthesis' in window){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}

function lightWord(){
  if (!pendingWords) return;
  const next = pendingWords.find(w => !w.classList.contains('on'));
  if (next){
    const prev = pendingWords.find(w => w.classList.contains('cur'));
    if (prev) prev.classList.remove('cur');
    next.classList.add('on');
    next.classList.add('cur');
    return true;
  }
  return false;
}
function revealAll(){
  if (pendingWords){ pendingWords.forEach(w => { w.classList.add('on'); w.classList.remove('cur'); }); pendingWords = null; }
  clearInterval(revealTimer);
}
function stopSpeech(){
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  if (curAudio){ try { curAudio.pause(); curAudio.currentTime = 0; } catch (e) {} curAudio = null; }
  revealAll();
}
function fallbackReveal(speed){
  clearInterval(revealTimer);
  revealTimer = setInterval(() => {
    if (!pendingWords){ clearInterval(revealTimer); return; }
    if (!lightWord()){ clearInterval(revealTimer); revealAll(); }
  }, speed || 120);
}

/* ───────── קבצי קול מוטמעים — מנגן הקלטה מראש ───────── */
const audioStore = {};            // שמור לתאימות (לא בשימוש פעיל)
let curAudio = null;
function audioFor(beat){
  if (beat == null) return '';
  if (typeof EMBEDDED_AUDIO !== 'undefined' && EMBEDDED_AUDIO[beat]) return EMBEDDED_AUDIO[beat];  // קבצי הקול המוטמעים
  if (audioStore[beat]) return audioStore[beat];
  if (CONFIG.audio && CONFIG.audio[beat]) return CONFIG.audio[beat];
  return '';
}
function revealAcrossDuration(ms){
  // חושף את המילים בקצב אחיד לאורך משך הקליפ (קריוקי מסונכרן לשמע)
  clearInterval(revealTimer);
  if (!pendingWords || !pendingWords.length) return;
  const n = pendingWords.length;
  const step = Math.max(140, (ms * 0.92) / n);
  revealTimer = setInterval(() => {
    if (!pendingWords){ clearInterval(revealTimer); return; }
    if (!lightWord()){ clearInterval(revealTimer); }
  }, step);
}
function playAudioNarration(src){
  const a = new Audio();
  a.preload = 'auto';
  a.volume = CONFIG.audioVolume != null ? CONFIG.audioVolume : 1;
  a.src = src;
  curAudio = a;
  let started = false, revealed = false, failed = false;

  function beginReveal(){
    if (revealed) return;
    revealed = true;
    const ms = (isFinite(a.duration) && a.duration > 0) ? a.duration * 1000 : 3500;
    revealAcrossDuration(ms);
  }
  a.onloadedmetadata = () => { started = true; };
  a.oncanplay = () => { started = true; };
  a.onplaying = () => { started = true; beginReveal(); };
  a.ontimeupdate = () => { if (a.currentTime > 0) { started = true; beginReveal(); } };
  a.onended = () => { revealAll(); if (curAudio === a) curAudio = null; };
  a.onerror = () => {                       // נפילה ל-TTS רק אם הקובץ באמת נכשל בטעינה
    if (failed) return; failed = true;
    if (curAudio === a) curAudio = null;
    ttsSay(lastText);
  };

  function tryPlay(attempt){
    const p = a.play();
    if (p && p.catch){
      p.catch(() => {
        // לא נכשל בטעינה — רק הושהה ע"י הדפדפן. ננסה שוב, לא נעבור ל-TTS.
        if (attempt < 8 && !failed){
          setTimeout(() => tryPlay(attempt + 1), 120);
        }
      });
    }
  }
  tryPlay(0);

  // אם השמע מתעכב אך לא נכשל — נתחיל חשיפת מילים משוערת כדי שהכתוביות לא יתקעו
  setTimeout(() => { if (!revealed && !failed && pendingWords) beginReveal(); }, 900);
}

let lastText = '', curBeat = null;
function botSay(text){
  lastText = text;
  if (muted){ fallbackReveal(70); return; }
  const src = audioFor(curBeat);
  if (src){ playAudioNarration(src); return; }   // עדיפות לקובץ קול
  ttsSay(text);
}
function ttsSay(text){
  if (muted || !('speechSynthesis' in window)){ fallbackReveal(70); return; }
  pickVoice();
  if (!voice && !warned){ warned = true; showToast('💡 לא נמצא קול הקראה בדפדפן זה', 6000); }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  if (voice) u.voice = voice;
  u.rate = CONFIG.ttsRate; u.pitch = 1;
  let gotBoundary = false;
  u.onboundary = () => {
    gotBoundary = true; clearInterval(revealTimer);
    lightWord();
  };
  u.onend = revealAll;
  u.onerror = revealAll;
  speechSynthesis.cancel();
  setTimeout(() => speechSynthesis.speak(u), 60);
  setTimeout(() => { if (!gotBoundary) fallbackReveal(125); }, 900);
}

function startScan(){
  const card = $id('scancard'), cam = $id('cam'), deg = $id('deg'), stage = $id('scanstage');
  const cx = 170, cy = 128, rx = 150, ry = 82, DUR = 7000;
  let start = null, stageIdx = -1, raf = 0, thinkTimer = null, thinking = false;
  const myGen = ++scanGen;

  function setStage(txt){
    stage.textContent = txt;
    stage.classList.remove('flip'); void stage.offsetWidth; stage.classList.add('flip');
  }
  function frame(ts){
    if (myGen !== scanGen){ clearInterval(thinkTimer); return; }
    if (!start) start = ts;
    const t = ts - start;
    const p = Math.min(1, t / DUR);
    if (p >= 1 && !thinking){
      thinking = true;
      card.classList.remove('scanning');
      card.classList.add('thinking');
      deg.textContent = '360° ✓';
      cam.style.opacity = 0;
      let i = 0;
      setStage(STAGES_THINK[0]); i = 1;
      thinkTimer = setInterval(() => { setStage(STAGES_THINK[i % STAGES_THINK.length]); i++; }, 1700);
      return;
    }
    const angle = p * 360;
    const a = (angle - 90) * Math.PI / 180;
    const x = cx + rx * Math.cos(a);
    const y = cy + ry * Math.sin(a);
    const depth = (Math.sin(a) + 1) / 2;
    cam.setAttribute('transform', 'translate(' + x.toFixed(1) + ' ' + y.toFixed(1) + ') scale(' + (0.6 + 0.5 * depth).toFixed(2) + ')');
    cam.style.opacity = (0.4 + 0.6 * depth).toFixed(2);
    deg.textContent = Math.floor(angle) + '°';
    const si = Math.floor(t / 1450) % STAGES_SCAN.length;
    if (si !== stageIdx){ stageIdx = si; setStage(STAGES_SCAN[si]); }
    raf = requestAnimationFrame(frame);
  }
  raf = requestAnimationFrame(frame);

  scan = {
    stop(){
      cancelAnimationFrame(raf);
      clearInterval(thinkTimer);
      card.classList.remove('scanning');
      card.classList.remove('thinking');
      card.classList.add('complete');
      deg.textContent = '360° ✓';
      stage.textContent = '✓ הניתוח הושלם';
      cam.style.opacity = 0;
      scan = null;
    }
  };
}

  setTimeout(() => {
    const D = 900, t0 = performance.now();

      const e = 1 - Math.pow(1 - p, 3);

      if (p < 1) requestAnimationFrame(f);
    }
    requestAnimationFrame(f);
  }, delay || 0);
}

function animateGauge(scope){
  const fill = scope.querySelector('.gfill'), num = scope.querySelector('.gnum');
  const target = CONFIG.conditionScore, D = 1100;
  setTimeout(() => {
    const t0 = performance.now();
    function f(ts){
      const p = Math.min(1, (ts - t0) / D);
      const e = 1 - Math.pow(1 - p, 3);
      const v = e * target;
      fill.setAttribute('stroke-dasharray', v.toFixed(1) + ' 100');
      num.textContent = Math.round(v) + '%';
      if (p < 1) requestAnimationFrame(f);
    }
    requestAnimationFrame(f);
  }, 520);
}

/* קרוסלת תוצאות בסגנון אמזון — מוצר אחד בכל פעם עם חצים ונקודות (במקום החלקה צידה) */
function productResults(){
  const w = el('div', 'msg bot cardmsg');
  w.innerHTML =
    '<div class="carousel" data-noadvance>' +
      '<div class="car-head"><b>' + PRODUCTS.length + ' תוצאות</b><span class="car-count"><i class="ci">1</i>/' + PRODUCTS.length + ' · מותאם לחיפוש</span></div>' +
      '<div class="car-view"><div class="car-stage"></div>' +
        '<button class="car-nav car-prev" type="button" aria-label="הקודם">›</button>' +
        '<button class="car-nav car-next" type="button" aria-label="הבא">‹</button>' +
      '</div>' +
      '<div class="car-dots"></div>' +
    '</div>';
  const root = w.querySelector('.carousel'), stage = root.querySelector('.car-stage'),
        dots = root.querySelector('.car-dots'), ci = root.querySelector('.ci');
  let idx = 0;
  function render(dir){
    const p = PRODUCTS[idx];
    stage.innerHTML =
      '<div class="car-card' + (p.rec ? ' rec' : '') + (dir === 'l' ? ' slidel' : '') + '">' +
        '<div class="car-img"><img class="' + ((p.rec || p.tint) ? 'sofa-src ' : '') + (p.tint ? 'tint-' + p.tint : '') + '" src="' + ((p.rec || p.tint) ? sofaSrc() : UNS(p.img, 700)) + '" alt="" onerror="' + IMGERR + '">' +
          (p.rec ? '<span class="fc-pick">★ ההמלצה של מצי</span>' : '<span class="fc-rank">תוצאה ' + (idx + 1) + '</span>') +
          '<span class="fc-verified">✓ מאומת</span></div>' +
        '<div class="car-body">' +
          '<div class="fc-title">' + p.title + '</div>' +
          '<div class="fc-rate">' + stars(p.rate) + ' <b>' + p.rate + '</b> <span>· ' + p.loc + ' · מצב ' + p.cond + '</span></div>' +
          '<div class="fc-price"><b>' + ils(p.price) + '</b><s>' + ils(p.market) + '</s>' +
            '<span class="fc-deal">' + pctOff(p.price, p.market) + '% מתחת לשוק</span></div>' +
        '</div></div>';
    ci.textContent = idx + 1;
    dots.innerHTML = PRODUCTS.map((_, i) => '<i class="' + (i === idx ? 'on' : '') + '"></i>').join('');
  }
  function go(d){ idx = (idx + d + PRODUCTS.length) % PRODUCTS.length; render(d > 0 ? 'l' : 'r'); }
  root.querySelector('.car-prev').addEventListener('click', e => { e.stopPropagation(); go(-1); });
  root.querySelector('.car-next').addEventListener('click', e => { e.stopPropagation(); go(1); });
  dots.addEventListener('click', e => { e.stopPropagation(); const i = [].indexOf.call(dots.children, e.target); if (i >= 0){ idx = i; render(); } });
  render();
  chat.appendChild(w); scrollBottom();
}

        '<div class="fc-rate">' + stars(p.rate) + ' <b>' + p.rate + '</b> <span>· 28 ביקורות</span></div>' +

/* הקלדה אנימטיבית של פרומפט ראשוני לתוך שורת הקלט — ואז "שליחה" כהודעת משתמש */
function typePrompt(text, after){
  if (replaying){ meText(text); if (after) after(); return; }
  const field = document.querySelector('.inputbar .field');
  if (!field){ meText(text); if (after) after(); return; }
  const placeholder = field.textContent;
  busy = true;
  field.classList.add('typing');
  let i = 0;
  (function tick(){
    if (i <= text.length){
      field.textContent = text.slice(0, i) + '│';
      i++;
      setTimeout(tick, 45);
    } else {
      setTimeout(() => {
        field.classList.remove('typing');
        field.textContent = placeholder;
        meText(text);
        busy = false;
        if (after) after();
      }, 420);
    }
  })();
}

function voicePrompt(text, after, opts){
  opts = opts || {};
  if (replaying){ meVoice(text, opts); if (after) after(); return; }
  const field = document.querySelector('.inputbar .field');
  const placeholder = field ? field.textContent : '';
  busy = true;
  showListen();
  if (field){
    field.classList.add('typing');
    field.textContent = 'הפעל את מצב השמע';
  }
  setTimeout(() => {
    hideListen();
    if (field){
      field.classList.remove('typing');
      field.textContent = placeholder;
    }
    meVoice(text, opts);
    if (after) after();
  }, opts.delay || 760);
}

let step = 0;
function advance(){
  if (busy || step >= beats.length) return;
  stopSpeech();
  const sp = $id('splash');
  if (sp && !sp.classList.contains('off')) sp.classList.add('off');
  curBeat = step + 1;            // מספר הביט (1-based) עבור בחירת קובץ הקול
  beats[step++]();
  $id('stepNow').textContent = step;
}
function reset(){

/* ═══════════ צעד אחורה (Back) — שחזור דטרמיניסטי ע"י הרצה מחדש ═══════════ */
/* מעקב אחר הטיימרים של ההדגמה כדי לבטל קולבקים תלויים בעת חזרה אחורה */
(function installTimerTracker(){
  const _set = window.setTimeout.bind(window);
  const _clear = window.clearTimeout.bind(window);
  const live = new Set();
  window.setTimeout = function(fn, ms){
    if (typeof fn !== 'function') return _set(fn, ms);
    const extra = Array.prototype.slice.call(arguments, 2);
    const id = _set(function(){ live.delete(id); fn.apply(null, extra); }, ms);
    live.add(id);
    return id;
  };
  window.__clearDemoTimers = function(){ live.forEach(function(id){ _clear(id); }); live.clear(); };
})();

/* הוסרו 2 שלבי מענה קולי לפרסום → מיפוי קבצי הקול המוטמעים לאינדקסים החדשים */
if (typeof EMBEDDED_AUDIO !== 'undefined' && EMBEDDED_AUDIO){
  if (EMBEDDED_AUDIO[9] && !EMBEDDED_AUDIO[7]){ EMBEDDED_AUDIO[7] = EMBEDDED_AUDIO[9]; delete EMBEDDED_AUDIO[9]; }
  if (EMBEDDED_AUDIO[10] && !EMBEDDED_AUDIO[8]){ EMBEDDED_AUDIO[8] = EMBEDDED_AUDIO[10]; delete EMBEDDED_AUDIO[10]; }
}

let replaying = false;

function goBack(){
  if (replaying || step <= 0) return;
  replayTo(step - 1);
}

function replayTo(target){
  replaying = true;
  /* פירוק מלא של המצב הנוכחי */
  if (window.__clearDemoTimers) window.__clearDemoTimers();
  stopSpeech();
  scanGen++;   /* מבטל כל לולאת סריקה רצה (גם יתומה) */
  if (scan){ try { scan.stop(); } catch (e) {} scan = null; }
  chat.innerHTML = CHAT_INIT;
  hideListen(); hideNotif();
  { const ho = $id('handoff'); if (ho){ ho.classList.remove('on'); ho.innerHTML = ''; } }
  { const ss = $id('salesplit'); if (ss){ ss.classList.remove('on'); ss.innerHTML = ''; } }
  document.querySelectorAll('.cf').forEach(function(c){ c.remove(); });
  chipsEl = null;
  const sp = $id('splash');

  if (target <= 0){
    if (sp) sp.classList.remove('off');
    setRole('');
    step = 0; busy = false; replaying = false;
    $id('stepNow').textContent = '0';
    return;
  }
  if (sp) sp.classList.add('off');

  /* הרצה מחדש מיידית ושקטה של השלבים 0..target-1 */
  const wasMuted = muted; muted = true;
  const prevTimeout = window.setTimeout;
  const prevFR = fallbackReveal;
  window.setTimeout = function(fn){ if (typeof fn === 'function'){ try { fn(); } catch (e) {} } return 0; };
  fallbackReveal = function(){};
  try {
    for (let i = 0; i < target; i++){
      busy = false; curBeat = i + 1;
      beats[i]();
    }
  } finally {
    window.setTimeout = prevTimeout;
    fallbackReveal = prevFR;
    muted = wasMuted;
    replaying = false;
  }

  /* גימור: לחשוף את כל המילים, לעצור דיבור, לעדכן מונה */
  chat.querySelectorAll('.msg .w').forEach(function(w){ w.classList.add('on'); });
  stopSpeech();
  step = target; busy = false;
  $id('stepNow').textContent = step;
  scrollBottom();
}

const backBtn = $id('backBtn');
if (backBtn) backBtn.addEventListener('click', goBack);
document.addEventListener('keydown', function(e){
  if (e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'Backspace' || e.key === 'b' || e.key === 'B'){
    e.preventDefault(); goBack();
  }
});

/* ───────── גלילה חכמה אוטומטית — כמו צ'אט אמיתי ─────────
   הודעה קצרה → גלילה לתחתית. כרטיס גבוה מהמסך → יישור ראשו לראש האזור,
   כדי שרואים אותו מההתחלה בלי לחתוך. עוקב אוטומטית, בלי צורך לגלול ידנית. */
function smartFollow(node){
  const c = $id('chat'); if (!c) return;
  if (!node) node = c.lastElementChild;
  const behavior = document.hidden ? 'auto' : 'smooth';
  if (!node || !node.getBoundingClientRect){ c.scrollTo({ top: c.scrollHeight, behavior: behavior }); return; }
  const nh = node.getBoundingClientRect().height;
  if (nh > c.clientHeight - 24){
    const delta = node.getBoundingClientRect().top - c.getBoundingClientRect().top;
    c.scrollTo({ top: Math.max(0, c.scrollTop + delta - 10), behavior: behavior });
  } else {
    c.scrollTo({ top: c.scrollHeight, behavior: behavior });
  }
}
/* מנתבים את קריאות הגלילה של ההדגמה דרך הלוגיקה החכמה */
scrollBottom = function(){ smartFollow(); };
(function autoFollowChat(){
  const c = $id('chat');
  if (!c || !window.MutationObserver) return;
  new MutationObserver(function(muts){
    let node = null;
    for (let i = 0; i < muts.length; i++){
      const ns = muts[i].addedNodes;
      for (let j = 0; j < ns.length; j++){ if (ns[j].nodeType === 1) node = ns[j]; }
    }
    if (node) smartFollow(node);
  }).observe(c, { childList: true });
})();
</script>

<script id="metzia-depth-buttons-script-v1">
(function(){
  function makeBtn(label, tone){
    var b=document.createElement('button');

  function schedule(){ if(raf) return; raf=requestAnimationFrame(function(){ raf=null; enhance(); }); }

})();
</script>
